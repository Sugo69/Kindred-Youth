<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Scout — Kindred Youth</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <!-- Firebase for Lesson Library reads — anonymous auth required by Firestore rules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getAllCfmLessons, getCurrentCfmLesson, resolveLessonIdFromUrl } from '../src/lib/cfm-schedule.js';

        // Expose the 2026 CFM Old Testament schedule to the Babel-compiled React tree.
        window.__kindredCfmLessons = getAllCfmLessons();
        window.__kindredCurrentCfmLesson = getCurrentCfmLesson();
        window.__kindredCfmLessonByUrl = function(url) {
            if (!url) return null;
            const lessonId = resolveLessonIdFromUrl(url);
            if (!lessonId) return null;
            return (window.__kindredCfmLessons || []).find(l => l.lessonId === lessonId) || null;
        };

        const APP_ID = 'exodus-feud-final-v10';

        // Classroom-scoped path — falls back to global when no ?room= param
        const classroomId = new URLSearchParams(location.search).get('room');
        window.__kindredClassroomId = classroomId;
        window.__kindredBasePath = classroomId
            ? `artifacts/${APP_ID}/public/data/classrooms/${classroomId}`
            : `artifacts/${APP_ID}/public/data`;
        window.__kindredGlobalBasePath = `artifacts/${APP_ID}/public/data`;

        const firebaseConfig = {
            apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
            authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
            projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
            storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
            messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
            appId: import.meta.env.VITE_FIREBASE_APP_ID,
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);
        const auth = getAuth(fbApp);

        // Wait for Firebase to restore auth state from localStorage before deciding to sign in anonymously.
        // Without authStateReady(), auth.currentUser is null on page load even when a Google session exists,
        // causing signInAnonymously to overwrite it and forcing re-login when returning to the portal.
        const _authReady = auth.authStateReady().then(() => {
            if (!auth.currentUser) return signInAnonymously(auth);
        }).catch(e => console.warn('Anon auth failed:', e));

        // Bridge for the Babel/React tree so it can attach an Authorization
        // header when calling /api/lesson-pipeline. Returns null if the user is
        // anonymous or signed out — caller surfaces a "please sign in" error.
        window.__kindredGetIdToken = async function() {
            await _authReady;
            const u = auth.currentUser;
            if (!u || u.isAnonymous) return null;
            return u.getIdToken();
        };

        window.__kindredApiBase = (location.hostname === 'kindred-youth.org' || location.hostname === 'www.kindred-youth.org')
            ? 'https://api.kindred-youth.org'
            : '';

        // Load lesson library entries that have memory content
        window.loadMemoryLibrary = async function() {
            try {
                await _authReady;
                const snap = await getDocs(collection(db, `${window.__kindredGlobalBasePath}/lessonLibrary`));
                return snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(e => e.memory?.pairs?.length);
            } catch(e) {
                console.warn('Memory library load failed:', e);
                return [];
            }
        };

        // Log pipeline/app errors to Firestore for debugging
        window.__kindredLogError = async function(payload) {
            try {
                await _authReady;
                await addDoc(collection(db, `${window.__kindredGlobalBasePath}/errorLog`), {
                    ...payload,
                    classroomId: window.__kindredClassroomId || null,
                    source: 'memory.html',
                    userAgent: navigator.userAgent,
                    createdAt: serverTimestamp(),
                });
            } catch(e) {
                console.warn('errorLog write failed:', e);
            }
        };

        // Load a single library entry's memory content
        window.loadMemoryFromLibrary = async function(lessonId) {
            await _authReady;
            const snap = await getDoc(doc(db, `${window.__kindredGlobalBasePath}/lessonLibrary/${lessonId}`));
            if (!snap.exists()) throw new Error('Library entry not found');
            const data = snap.data();
            if (!data.memory?.pairs?.length) throw new Error('No memory content in this library entry');
            return data.memory;
        };
    </script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .back-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: rgba(2,6,23,0.96); border-bottom: 1px solid rgba(0,242,255,0.15); padding: 6px 14px; display: flex; align-items: center; gap: 12px; }
        .back-nav a { color: #00f2ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .back-nav a:hover { opacity: 1; }
        .back-nav span { color: #333; font-size: 0.7rem; }
        body { padding-top: 34px; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-5px) rotate(-2deg)} 20%,40%,60%,80%{transform:translateX(5px) rotate(2deg)} }
        .animate-error-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes float { 0%{transform:translateY(0)} 50%{transform:translateY(-12px)} 100%{transform:translateY(0)} }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden">

    <div class="back-nav">
        <a href="../index.html">← Kindred Hub</a>
        <span>|</span>
        <span style="color:#555; font-family:'Orbitron',sans-serif; font-size:0.6rem; text-transform:uppercase; letter-spacing:1px;">Scripture Scout</span>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DEFAULT PAIRS (Exodus lesson — used as fallback) ---
        const DEFAULT_PAIRS = [
            { id:'d1', cardA:'Exodus 14:13-14 — Stand Still', cardB:'The Lord will fight for you', scene:'The Shores of the Red Sea', verse:'"Fear ye not, stand still, and see the salvation of the Lord… The Lord shall fight for you, and ye shall hold your peace."', question:'What does it mean to stand still and trust God during a hard trial?', christConnection:'Christ fights our battles when we trust Him.', icon:'🌊', iconLabel:'Red Sea' },
            { id:'d2', cardA:'Exodus 14:21 — Parting the Sea', cardB:'God can prepare a way all night', scene:'The Shores of the Red Sea', verse:'"And Moses stretched out his hand over the sea; and the Lord caused the sea to go back by a strong east wind all that night, and made the sea dry land, and the waters were divided."', question:'How does God prepare the way for us over time — not always instantly?', christConnection:'Christ opens paths through our impossible barriers.', icon:'💨', iconLabel:'Parting the Sea' },
            { id:'d3', cardA:'Exodus 16:4 — Manna', cardB:'Gather spiritual nourishment daily', scene:'The Wilderness of Sin', verse:'"Then said the Lord unto Moses, Behold, I will rain bread from heaven for you; and the people shall go out and gather a certain rate every day."', question:'How is reading scriptures every day like gathering Manna?', christConnection:'Christ is the Bread of Life — daily nourishment from Him.', icon:'🍞', iconLabel:'Daily Bread' },
            { id:'d4', cardA:'Exodus 17:6 — Water from Rock', cardB:'Christ is the Rock of Living Water', scene:'Horeb — The Mountain of God', verse:'"Behold, I will stand before thee there upon the rock in Horeb; and thou shalt smite the rock, and there shall come water out of it, that the people may drink."', question:'When do you feel spiritually thirsty, and where do you go?', christConnection:'Jesus is the source of living water (John 4:14).', icon:'🪨', iconLabel:'The Rock' },
            { id:'d5', cardA:'Exodus 17:11 — Sustaining Moses', cardB:'We support each other in the fight', scene:'The Battle with Amalek', verse:'"And it came to pass, when Moses held up his hand, that Israel prevailed: and when he let down his hand, Amalek prevailed… Aaron and Hur stayed up his hands."', question:'How can we "hold up the arms" of our leaders and friends today?', christConnection:'Christ strengthens us as we serve together.', icon:'🙌', iconLabel:'Sustain' },
            { id:'d6', cardA:'Exodus 12:13 — Passover Blood', cardB:'The Atonement of Jesus Christ', scene:'Egypt — Night of the Passover', verse:'"And the blood shall be to you for a token upon the houses where ye are: and when I see the blood, I will pass over you, and the plague shall not be upon you."', question:'What does the blood of the lamb teach us about the Savior?', christConnection:"The Passover lamb is a type of Jesus Christ's sacrifice.", icon:'🩸', iconLabel:'Passover' },
            { id:'d7', cardA:'Exodus 20:3 — No Other Gods', cardB:'Golden calves of today', scene:'The Camp of Israel — Mount Sinai', verse:'"Thou shalt have no other gods before me."', question:'What are "golden calves" — distractions — that compete for your devotion?', christConnection:'God calls us to love Him with all our heart.', icon:'🐄', iconLabel:'Golden Calf' },
            { id:'d8', cardA:'Exodus 3:2 — Burning Bush', cardB:'God speaks through sacred moments', scene:'The Wilderness of Midian', verse:'"And the angel of the Lord appeared unto him in a flame of fire out of the midst of a bush… and, behold, the bush burned with fire, and the bush was not consumed."', question:'What is something holy in your life you need to pay more attention to?', christConnection:'Christ calls us to holy ground — sacred, attentive moments with Him.', icon:'🌳', iconLabel:'Holy Ground' },
            { id:'d9', cardA:'Numbers 21:8 — Brazen Serpent', cardB:'Look to Christ and live', scene:'The Wilderness — A Plague of Serpents', verse:'"And the Lord said unto Moses, Make thee a fiery serpent, and set it upon a pole: and it shall come to pass, that every one that is bitten, when he looketh upon it, shall live."', question:'Why is it sometimes hard to simply look to Christ when we are hurting?', christConnection:'Jesus said: as Moses lifted the serpent, so must the Son of Man be lifted up (John 3:14).', icon:'🐍', iconLabel:'Look & Live' },
            { id:'d10', cardA:"Numbers 13:30 — Caleb's Faith", cardB:'Ten saw giants; two saw miracles', scene:'Kadesh-barnea — The Border of Canaan', verse:'"And Caleb stilled the people before Moses, and said, Let us go up at once, and possess it; for we are well able to overcome it."', question:'How can we choose to see our challenges through eyes of faith?', christConnection:'Faith in Christ changes what we see as possible.', icon:'🍇', iconLabel:'The Spies' },
            { id:'d11', cardA:'Exodus 25:8 — The Tabernacle', cardB:'God dwells with His people', scene:'The Camp of Israel', verse:'"And let them make me a sanctuary; that I may dwell among them."', question:'Why do we build temples today? How do you feel on temple grounds?', christConnection:'Temples are the house of the Lord — where we meet Christ.', icon:'⛺', iconLabel:'Tabernacle' },
            { id:'d12', cardA:'Exodus 34:29 — Shining Face', cardB:'Time with God transforms us', scene:'Mount Sinai', verse:'"And it came to pass… that Moses wist not that the skin of his face shone while he talked with him."', question:'How does spending time with God change who we are?', christConnection:'We become more like Christ the more time we spend with Him.', icon:'🌟', iconLabel:'Shining Face' },
        ];

        // Audio helpers
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                if (type === 'flip') { osc.frequency.value = 880; gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15); }
                else if (type === 'match') { [523,659,784].forEach((f,i) => { const o=ctx.createOscillator(); const g=ctx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0,ctx.currentTime+i*0.1); g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.1+0.05); g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.1+0.25); o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.3); }); return; }
                else if (type === 'mismatch') { osc.type='sawtooth'; osc.frequency.value=120; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3); }
                else if (type === 'win') { [523,659,784,1046,1318].forEach((f,i)=>{ const o=ctx.createOscillator(); const g=ctx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0,ctx.currentTime+i*0.1); g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.1+0.05); g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.1+0.4); o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.5); }); return; }
                else if (type === 'sabotage') { osc.type='sawtooth'; osc.frequency.setValueAtTime(400,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.8); gain.gain.setValueAtTime(0.4,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8); }
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.5);
            } catch(e) {}
        };

        function App() {
            const [gameState, setGameState] = useState('portal'); // portal | rules | playing | won
            const [pairsData, setPairsData] = useState(DEFAULT_PAIRS);
            const [lessonTopic, setLessonTopic] = useState('Exodus & Numbers — Wilderness Journey');
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [isChecking, setIsChecking] = useState(false);
            const [mismatchIdx, setMismatchIdx] = useState([]);
            const [activeCard, setActiveCard] = useState(null);
            const [isSabotaging, setIsSabotaging] = useState(false);
            const [scale, setScale] = useState(100);
            const [showAdmin, setShowAdmin] = useState(false);
            const [sabotageEvery, setSabotageEvery] = useState(3);

            // Teacher Portal state
            const [portalView, setPortalView] = useState('home'); // home | lesson | manual
            const [lessonUrl, setLessonUrl] = useState('');
            const [portalStatus, setPortalStatus] = useState('');
            const [portalLoading, setPortalLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [manualPairs, setManualPairs] = useState([]);
            const [generatedFromUrl, setGeneratedFromUrl] = useState('');
            const [generatedAt, setGeneratedAt] = useState(null);
            const [generatedMedia, setGeneratedMedia] = useState({ videoLinks: [], talkLinks: [] });
            const [showSettings, setShowSettings] = useState(false);
            const retryTimerRef = useRef(null);
            const attemptCountRef = useRef(0);
            const progressTimerRef = useRef(null);
            const [libraryEntries, setLibraryEntries] = useState([]);
            const [libraryLoading, setLibraryLoading] = useState(false);
            const [showArchive, setShowArchive] = useState(false);

            // Apply saved scale
            useEffect(() => {
                const saved = localStorage.getItem('kindred_display_scale');
                if (saved && !isNaN(parseFloat(saved))) setScale(parseFloat(saved) * 100);
            }, []);

            // Build a Gospel-Library URL with the blue verse-highlight bar.
            // Matches "Book Chapter:start" or "Book Chapter:start–end" anywhere in the scripture reference.
            // Whole-chapter refs (no colon) fall back to the raw URL (no highlight, no anchor).
            const buildHighlightUrl = (rawUrl, scriptureRef) => {
                if (!rawUrl) return rawUrl;
                const ref = (scriptureRef || '').trim();
                const m = ref.match(/:(\d+)(?:\s*[\u2013\u2014\u2010\u2011\u2212\-]\s*(\d+))?(?!\d)/);
                if (!m) return rawUrl;
                const start = parseInt(m[1], 10);
                const end = m[2] ? parseInt(m[2], 10) : start;
                const idParam = end > start ? `${start}-${end}` : `${start}`;
                try {
                    const u = new URL(rawUrl);
                    u.searchParams.set('id', idParam);
                    u.hash = `p${start}`;
                    return u.toString();
                } catch { return rawUrl; }
            };

            // QR code — uses the highlight URL so the scanned page lights up the verse.
            useEffect(() => {
                if (activeCard?.url) {
                    setTimeout(() => {
                        const el = document.getElementById('qr-canvas');
                        const href = buildHighlightUrl(activeCard.url, activeCard.cardA);
                        if (el && window.QRious) new window.QRious({ element: el, value: href, size: 140, background: 'white', foreground: '#0a0a20' });
                    }, 60);
                }
            }, [activeCard]);

            // Win detection
            useEffect(() => {
                if (cards.length > 0 && matched.length === cards.length / 2 && !activeCard) {
                    setGameState('won');
                }
            }, [matched, cards.length, activeCard]);

            const initGame = (pairs) => {
                const gamePairs = pairs || pairsData;
                let deck = [];
                gamePairs.forEach(p => {
                    deck.push({ ...p, uniqueId: `${p.id}-A`, face: 'A', pairId: p.id });
                    deck.push({ ...p, uniqueId: `${p.id}-B`, face: 'B', pairId: p.id });
                });
                deck = deck.sort(() => Math.random() - 0.5);
                setCards(deck); setFlipped([]); setMatched([]); setActiveCard(null);
            };

            const startGame = () => {
                if (portalLoading) return;
                initGame(); setGameState('rules');
            };

            const handleCardClick = (idx) => {
                if (isChecking || flipped.includes(idx)) return;
                // Already-matched cards re-open their modal so the class can revisit the discussion.
                if (matched.includes(cards[idx].pairId)) {
                    setActiveCard(cards[idx]);
                    return;
                }
                if (flipped.length === 0) playSound('flip');
                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setIsChecking(true);
                    const c1 = cards[newFlipped[0]], c2 = cards[newFlipped[1]];
                    if (c1.pairId === c2.pairId) {
                        const isFinal = matched.length + 1 === cards.length / 2;
                        playSound(isFinal ? 'win' : 'match');
                        setTimeout(() => {
                            setMatched(prev => [...prev, c1.pairId]);
                            setFlipped([]); setIsChecking(false); setActiveCard(c1);
                        }, 500);
                    } else {
                        playSound('mismatch');
                        setMismatchIdx(newFlipped);
                        setTimeout(() => { setFlipped([]); setMismatchIdx([]); setIsChecking(false); }, 900);
                    }
                }
            };

            const handleSabotage = () => {
                playSound('sabotage'); setIsSabotaging(true); setActiveCard(null);
                setTimeout(() => { setCards(prev => [...prev].sort(() => Math.random() - 0.5)); setIsSabotaging(false); }, 1500);
            };

            const canSabotage = activeCard && matched.length > 0 && matched.length % sabotageEvery === 0 && matched.length < cards.length / 2;
            const cols = pairsData.length <= 8 ? 4 : pairsData.length <= 12 ? 6 : 6;

            // Load library when switching to the library view
            useEffect(() => {
                if (portalView === 'library' && window.loadMemoryLibrary) {
                    let cancelled = false;
                    setLibraryLoading(true);
                    window.loadMemoryLibrary().then(entries => {
                        if (!cancelled) {
                            setLibraryEntries(entries);
                            setLibraryLoading(false);
                        }
                    });
                    return () => { cancelled = true; };
                }
            }, [portalView]);

            const loadFromLibrary = async (entry) => {
                // Cancel any pending retry timer so it can't overwrite library-loaded pairs
                if (retryTimerRef.current) { clearInterval(retryTimerRef.current); retryTimerRef.current = null; }
                try {
                    setPortalLoading(true);
                    setPortalStatus('Loading from library…');
                    const memData = await window.loadMemoryFromLibrary(entry.id);
                    clearInterval(progressTimerRef.current);
                    setPairsData(memData.pairs);
                    setLessonTopic(memData.topic || entry.name || 'Library Lesson');
                    setGeneratedFromUrl(memData.sourceUrl || entry.url || '');
                    setGeneratedAt(memData.generatedAt ? new Date(memData.generatedAt) : new Date());
                    setGeneratedMedia({ videoLinks: memData.videoLinks || [], talkLinks: memData.talkLinks || [] });
                    setPortalLoading(false);
                    setPortalStatus(`✓ Loaded "${memData.topic || 'lesson'}" from library — ${memData.pairs.length} pairs. Ready to play!`);
                    setPortalView('home');
                } catch(err) {
                    setPortalStatus(`⚠ ${err.message}`);
                    setPortalLoading(false);
                }
            };

            // Teacher Portal — generate from lesson URL
            const generateFromLesson = async (isAutoRetry = false) => {
                if (retryTimerRef.current) { clearInterval(retryTimerRef.current); retryTimerRef.current = null; }
                if (!lessonUrl.trim()) { setPortalStatus('Please enter a lesson URL.'); return; }
                if (!isAutoRetry) attemptCountRef.current = 0;
                attemptCountRef.current += 1;
                setPortalLoading(true);
                setPortalStatus(`Running lesson pipeline… (attempt ${attemptCountRef.current}/2)`);
                setProgress(0);
                // Animate progress: ease toward 90% over ~40s, never reaching 100 until done
                let pct = 0;
                if (progressTimerRef.current) clearInterval(progressTimerRef.current);
                progressTimerRef.current = setInterval(() => {
                    pct += (90 - pct) * 0.035;
                    setProgress(Math.min(pct, 89));
                }, 500);
                try {
                    const token = await window.__kindredGetIdToken?.();
                    if (!token) throw new Error('Please sign in via the Kindred Hub before generating.');
                    const resp = await fetch(`${window.__kindredApiBase}/api/lesson-pipeline`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        },
                        body: JSON.stringify({ url: lessonUrl, gameType: 'memory' })
                    });
                    const data = await resp.json();
                    if (!resp.ok) {
                        const e = new Error(data.error || 'Pipeline failed');
                        e.step = data.step; e.debugExcerpt = data.debugExcerpt; e.httpStatus = resp.status;
                        throw e;
                    }
                    if (!data.pairs?.length) throw new Error('No pairs returned');
                    clearInterval(progressTimerRef.current);
                    setProgress(100);
                    setPairsData(data.pairs);
                    setLessonTopic(data.topic || 'Custom Lesson');
                    setPortalStatus(`✓ Generated ${data.pairs.length} matching pairs. Ready to play!`);
                    setGeneratedFromUrl(lessonUrl);
                    setGeneratedAt(new Date());
                    setGeneratedMedia({ videoLinks: data.videoLinks || [], talkLinks: data.talkLinks || [] });
                    setPortalLoading(false);
                    attemptCountRef.current = 0;
                } catch(err) {
                    clearInterval(progressTimerRef.current);
                    setProgress(0);
                    setPortalLoading(false);
                    console.error('[generateFromLesson] attempt', attemptCountRef.current, 'failed:', err);
                    if (window.__kindredLogError) {
                        window.__kindredLogError({
                            context: 'memory.generateFromLesson',
                            attempt: attemptCountRef.current,
                            lessonUrl,
                            errorMessage: err.message,
                            step: err.step || null,
                            httpStatus: err.httpStatus || null,
                            debugExcerpt: err.debugExcerpt || null,
                        });
                    }
                    if (attemptCountRef.current >= 2) {
                        setPortalStatus(`⚠ Generation failed twice: ${err.message}. Error logged — share with Kindred support. Click Generate to try again.`);
                        attemptCountRef.current = 0;
                        return;
                    }
                    let secs = 30;
                    setPortalStatus(`⚠ ${err.message} — retrying in ${secs}s (attempt ${attemptCountRef.current + 1}/2) or click Generate again`);
                    retryTimerRef.current = setInterval(() => {
                        secs--;
                        if (secs <= 0) {
                            clearInterval(retryTimerRef.current); retryTimerRef.current = null;
                            generateFromLesson(true);
                        } else {
                            setPortalStatus(`⚠ ${err.message} — retrying in ${secs}s (attempt ${attemptCountRef.current + 1}/2) or click Generate again`);

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 text-left">
                            {[['🎯','Find the Match','Flip two cards. When they match — Card A (scripture) pairs with Card B (key phrase) — a discussion question unlocks.'],
                              ['⚡','Divine Intervention','Every '+sabotageEvery+' matches you get a choice: take another free turn, or unleash Sabotage to scramble all unmatched cards.'],
                              ['🛡️','Friendly Sabotage',"Sabotage shuffles the board and ruins your opponent's memory — but it's always your choice!"],
                              ['🏆','Class Wins','Find all pairs to complete the mission. The real prize: the discussion goes deep.']
                            ].map(([icon,title,desc])=>(
                                <div key={title} className="bg-slate-950/60 p-4 rounded-xl border border-slate-800 flex gap-3">
                                    <span className="text-2xl flex-shrink-0">{icon}</span>
                                    <div><div className="font-black text-slate-200 text-sm uppercase tracking-wider mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>{title}</div><p className="text-slate-400 text-xs leading-relaxed">{desc}</p></div>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-3 justify-center">
                            <button onClick={() => setGameState('playing')}
                                className="px-10 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-lg tracking-widest uppercase rounded-lg transition-all hover:scale-105"
                                style={{fontFamily:'Orbitron,sans-serif'}}>Deploy →</button>
                            <button onClick={() => setGameState('portal')}
                                className="px-6 py-3 border border-slate-600 text-slate-400 font-bold text-sm uppercase rounded-lg hover:bg-slate-800"
                                style={{fontFamily:'Orbitron,sans-serif'}}>← Back</button>
                        </div>
                    </div>
                </div>
            );

            // --- WON VIEW ---
            if (gameState === 'won') return (
                <div style={{ position:'fixed', top:0, left:0, width:`${10000/scale}vw`, height:`${10000/scale}vh`, transform:`scale(${scale/100})`, transformOrigin:'top left', overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#020617' }}>
                    <h2 className="text-6xl md:text-8xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-cyan-400 drop-shadow-[0_0_40px_rgba(234,179,8,0.5)] mb-6" style={{fontFamily:'Orbitron,sans-serif'}}>MISSION COMPLETE!</h2>
                    <p className="text-slate-400 text-xl mb-8">{pairsData.length} pairs found — {lessonTopic}</p>
                    <div className="flex gap-4">
                        <button onClick={() => { initGame(); setGameState('playing'); }}
                            className="px-8 py-3 bg-cyan-500 text-black font-black text-sm tracking-widest uppercase rounded-lg hover:bg-cyan-400 hover:scale-105 transition-all"
                            style={{fontFamily:'Orbitron,sans-serif'}}>Play Again</button>
                        <button onClick={() => setGameState('portal')}
                            className="px-8 py-3 border border-slate-600 text-slate-400 font-bold text-sm uppercase rounded-lg hover:bg-slate-800"
                            style={{fontFamily:'Orbitron,sans-serif'}}>← Portal</button>
                    </div>
                </div>
            );

            // --- PLAYING VIEW ---
            // Scale strategy: header + admin panel render at native viewport size (so gear is always
            // reachable). Only the card grid is inside transform:scale(). At sf > 1 grid overflows
            // the viewport (clipped); at sf < 1 slate background shows around it.
            return (
                <div style={{ position:'fixed', top:'34px', left:0, right:0, bottom:0, overflow:'hidden', background:'#020617', display:'flex', flexDirection:'column' }}>
                    {/* Header — unscaled, fixed at top */}
                    <header className="flex items-center justify-between px-4 py-2 bg-slate-900 border-b border-cyan-500/20 flex-shrink-0">
                        <span className="text-slate-500 text-xs font-bold tracking-widest" style={{fontFamily:'Orbitron,sans-serif'}}>
                            {matched.length}/{pairsData.length} MATCHED
                        </span>
                        <span className="text-xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-widest" style={{fontFamily:'Orbitron,sans-serif'}}>
                            SCRIPTURE SCOUT
                        </span>
                        <button onClick={()=>setShowAdmin(!showAdmin)} className="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-600 text-slate-300 hover:text-cyan-400 hover:border-cyan-500 transition-colors text-base">⚙</button>
                    </header>

                    {/* Admin panel — unscaled, below header */}
                    {showAdmin && (
                        <div className="bg-slate-900 border-b border-slate-700 px-4 py-3 flex gap-4 items-center flex-shrink-0 flex-wrap">
                            <div className="flex items-center gap-2">
                                <span className="text-slate-500 text-xs" style={{fontFamily:'Orbitron,sans-serif'}}>SABOTAGE EVERY</span>
                                <input type="number" value={sabotageEvery} min="1" max="6" onChange={e=>setSabotageEvery(parseInt(e.target.value)||2)}
                                    className="w-14 bg-slate-950 border border-slate-600 text-white text-center text-sm rounded-lg px-2 py-1 focus:outline-none focus:border-cyan-500" />
                                <span className="text-slate-500 text-xs">matches</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-slate-500 text-xs" style={{fontFamily:'Orbitron,sans-serif'}}>SCALE</span>
                                <input type="range" min="50" max="150" value={scale} onChange={e=>{setScale(parseInt(e.target.value));localStorage.setItem('kindred_display_scale',(parseInt(e.target.value)/100).toString());}}
                                    className="w-24" />
                                <span className="text-cyan-400 text-xs">{scale}%</span>
                            </div>
                            <button onClick={()=>{initGame();setShowAdmin(false);}}
                                className="px-3 py-1 border border-slate-600 text-slate-400 text-xs rounded-lg hover:bg-slate-800 uppercase"
                                style={{fontFamily:'Orbitron,sans-serif'}}>↺ Restart</button>
                            <button onClick={()=>{setPortalView('lesson');setShowAdmin(false);setGameState('portal');}}
                                className="px-3 py-1 border border-amber-600 text-amber-400 text-xs rounded-lg hover:bg-amber-900/30 uppercase"
                                style={{fontFamily:'Orbitron,sans-serif'}}>🔁 Switch Lesson</button>
                            <button onClick={()=>setGameState('portal')}
                                className="px-3 py-1 border border-slate-600 text-slate-400 text-xs rounded-lg hover:bg-slate-800 uppercase"
                                style={{fontFamily:'Orbitron,sans-serif'}}>← Portal</button>
                        </div>
                    )}

                    {/* Scaled stage — only the card grid scales */}
                    <div style={{ flex:1, minHeight:0, overflow:'hidden', transform:`scale(${scale/100})`, transformOrigin:'top center' }}>
                    <main className={`p-3 ${isSabotaging ? 'animate-error-shake' : ''}`} style={{width:'100%',height:'100%'}}>
                        <div className={`grid gap-2 w-full h-full transition-all duration-500`}
                            style={{ gridTemplateColumns: `repeat(${cols}, 1fr)`, gridAutoRows: '1fr' }}>
                            {cards.map((card, idx) => {
                                const isFlipped = flipped.includes(idx);
                                const isMatched = matched.includes(card.pairId);
                                const isMismatch = mismatchIdx.includes(idx);
                                const isFaceA = card.face === 'A';
                                return (
                                    <div key={card.uniqueId}
                                        className={`relative perspective-1000 cursor-pointer ${isMismatch ? 'animate-error-shake' : ''}`}
                                        onClick={() => handleCardClick(idx)}>
                                        <div className={`w-full h-full transform-style-3d transition-transform duration-500 ${isFlipped || isMatched ? 'rotate-y-180' : ''}`}>
                                            {/* Back */}
                                            <div className={`absolute inset-0 backface-hidden rounded-xl border-2 flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900
                                                ${isMismatch ? 'border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'border-cyan-500/30 hover:border-cyan-400 hover:shadow-[0_0_15px_rgba(0,242,255,0.3)]'}`}>
                                                <span className="text-3xl md:text-5xl font-black text-cyan-500/20 select-none">?</span>
                                            </div>
                                            {/* Front */}
                                            <div className={`absolute inset-0 backface-hidden rotate-y-180 rounded-xl flex flex-col items-center justify-center p-2 text-center border-2 transition-all
                                                ${isMatched
                                                    ? 'bg-slate-900/60 border-slate-700 opacity-40 hover:opacity-90 hover:border-orange-400 hover:shadow-[0_0_15px_rgba(249,115,22,0.35)]'
                                                    : isFaceA
                                                        ? 'bg-gradient-to-br from-cyan-900/60 to-slate-900 border-cyan-400 shadow-[0_0_20px_rgba(0,242,255,0.3)]'
                                                        : 'bg-gradient-to-br from-purple-900/60 to-slate-900 border-purple-400 shadow-[0_0_20px_rgba(157,0,255,0.3)]'}`}>
                                                <>
                                                    <span style={{fontSize:'clamp(2rem,4vw,3.5rem)', lineHeight:1, marginBottom:'0.35em'}}>{card.icon}</span>
                                                    <div className={`font-bold leading-tight px-1 text-center ${isFaceA ? 'text-cyan-300' : 'text-purple-300'}`}
                                                        style={{fontFamily: isFaceA ? 'Orbitron,sans-serif' : 'Rajdhani,sans-serif', fontSize:'clamp(0.45rem,1.1vw,0.7rem)'}}>
                                                        {isFaceA ? card.cardA : card.cardB}
                                                    </div>
                                                </>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                    </div>{/* end scaled stage */}

                    {/* Match modal — sibling of scaled stage so it is never scaled */}
                    {activeCard && (
                        <div style={{position:'fixed',inset:0,zIndex:50,background:'rgba(2,6,23,0.97)',display:'flex',alignItems:'stretch',justifyContent:'center',padding:'0.5rem'}}>
                            <div style={{width:'100%',maxWidth:'1800px',display:'flex',flexDirection:'column',border:'2px solid #f97316',borderRadius:'1rem',background:'#0b0f1a',overflow:'hidden',boxShadow:'0 0 60px rgba(249,115,22,0.25)'}}>

                                {/* ── Top bar: title + X ── */}
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.75rem 1.5rem',background:'rgba(0,0,0,0.35)',borderBottom:'1px solid rgba(249,115,22,0.2)',flexShrink:0}}>
                                    <div className="font-black text-orange-400" style={{fontFamily:'Rajdhani,sans-serif',fontSize:'clamp(1.4rem,2.8vw,2.2rem)',letterSpacing:'0.02em'}}>{activeCard.iconLabel}</div>
                                    <button onClick={() => setActiveCard(null)}
                                        style={{background:'rgba(249,115,22,0.15)',border:'2px solid rgba(249,115,22,0.5)',borderRadius:'9999px',color:'#fb923c',width:'2.4rem',height:'2.4rem',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',cursor:'pointer',fontWeight:900}}>✕</button>
                                </div>

                                {/* ── Main split ── */}
                                <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>

                                    {/* Left: big icon in dark box */}
                                    <div style={{width:'40%',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at center,#1c1020,#05040a)',borderRight:'1px solid rgba(249,115,22,0.15)'}}>
                                        <span style={{fontSize:'clamp(6rem,14vw,11rem)',lineHeight:1,filter:'drop-shadow(0 0 50px rgba(249,115,22,0.3))'}}>{activeCard.icon}</span>
                                    </div>

                                    {/* Right: QR pinned top-right, content vertically centered */}
                                    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'1.25rem 1.75rem',overflow:'auto',position:'relative',justifyContent:'center',gap:'0.75rem'}}>

                                        {/* Scene pill — sits directly above scripture ref */}
                                        {activeCard.scene && (
                                            <div style={{flexShrink:0}}>
                                                <div style={{background:'rgba(194,65,12,0.7)',borderRadius:'0.4rem',padding:'0.25rem 0.75rem',display:'inline-block'}}>
                                                    <span style={{fontFamily:'Orbitron,sans-serif',fontSize:'0.6rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'#fed7aa'}}>Scene: {activeCard.scene}</span>
                                                </div>
                                            </div>
                                        )}

                                        {/* Scripture reference */}
                                        <div style={{fontFamily:'Orbitron,sans-serif',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#e2e8f0',fontSize:'clamp(1rem,2vw,1.6rem)',flexShrink:0}}>
                                            {activeCard.cardA.split(' — ')[0]}
                                        </div>

                                        {/* Scripture verse */}
                                        {activeCard.verse && (
                                            <div style={{borderLeft:'3px solid #f97316',paddingLeft:'1rem',flexShrink:0}}>
                                                <p style={{fontFamily:'Rajdhani,sans-serif',fontStyle:'italic',color:'#cbd5e1',lineHeight:1.55,fontSize:'clamp(1.05rem,1.9vw,1.45rem)',margin:0}}>{activeCard.verse}</p>
                                            </div>
                                        )}

                                        {/* Christ connection */}
                                        {activeCard.christConnection && (
                                            <div style={{background:'rgba(253,224,71,0.08)',border:'1px solid rgba(253,224,71,0.3)',borderRadius:'0.5rem',padding:'0.65rem 1rem',flexShrink:0}}>
                                                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'0.6rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'#facc15',marginBottom:'0.35rem'}}>✝ Christ Connection</div>
                                                <p style={{fontFamily:'Rajdhani,sans-serif',fontWeight:600,color:'#fef3c7',lineHeight:1.5,fontSize:'clamp(0.95rem,1.7vw,1.3rem)',margin:0}}>{activeCard.christConnection}</p>
                                            </div>
                                        )}

                                        {/* Class discussion */}
                                        <div style={{background:'rgba(6,182,212,0.07)',border:'1px solid rgba(6,182,212,0.25)',borderRadius:'0.5rem',padding:'0.75rem 1rem',flexShrink:0}}>
                                            <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'0.6rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'#22d3ee',marginBottom:'0.5rem'}}>✦ Class Discussion</div>
                                            <p style={{fontFamily:'Rajdhani,sans-serif',fontWeight:700,color:'#f1f5f9',lineHeight:1.5,fontSize:'clamp(1.1rem,2vw,1.65rem)',margin:0}}>{activeCard.question}</p>
                                        </div>

                                        {/* QR code — below discussion, slightly rotated. On-screen click opens scripture in a new tab so the classroom monitor stays on the game. */}
                                        {activeCard.url && (
                                            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'0.3rem',flexShrink:0,transform:'rotate(3deg)',transformOrigin:'left center',marginLeft:'0.25rem'}}>
                                                <a href={buildHighlightUrl(activeCard.url, activeCard.cardA)} target="_blank" rel="noopener noreferrer" title="Open scripture in a new tab" style={{display:'block',lineHeight:0}}>
                                                    <canvas id="qr-canvas" style={{borderRadius:'0.4rem',border:'1px solid #374151',cursor:'pointer'}} />
                                                </a>
                                                <span style={{fontFamily:'Orbitron,sans-serif',fontSize:'0.5rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.1em'}}>Scan or click to read along</span>
                                            </div>
                                        )}

                                    </div>
                                </div>

                                {/* ── Bottom bar ── */}
                                <div style={{borderTop:'1px solid rgba(249,115,22,0.2)',background:'rgba(0,0,0,0.4)',padding:'0.85rem 1.5rem',display:'flex',alignItems:'center',gap:'1.5rem',flexShrink:0}}>
                                    {canSabotage ? (
                                        <>
                                            <span style={{fontFamily:'Orbitron,sans-serif',fontSize:'0.65rem',color:'#f97316',letterSpacing:'0.1em',textTransform:'uppercase',flexShrink:0}}>
                                                Choice: Close (✕) to take another turn… or
                                            </span>
                                            <button onClick={handleSabotage}
                                                style={{background:'#dc2626',border:'none',borderRadius:'0.5rem',color:'white',fontFamily:'Orbitron,sans-serif',fontWeight:900,fontSize:'clamp(0.75rem,1.1vw,0.95rem)',textTransform:'uppercase',letterSpacing:'0.15em',padding:'0.75rem 2rem',cursor:'pointer',whiteSpace:'nowrap'}}>
                                                💥 Execute Sabotage!
                                            </button>
                                        </>
                                    ) : (
                                        <button onClick={() => setActiveCard(null)}
                                            style={{flex:1,padding:'0.75rem',background:'linear-gradient(90deg,#0891b2,#06b6d4)',border:'none',borderRadius:'0.5rem',color:'black',fontFamily:'Orbitron,sans-serif',fontWeight:900,fontSize:'clamp(0.75rem,1.1vw,0.95rem)',textTransform:'uppercase',letterSpacing:'0.15em',cursor:'pointer'}}>
                                            Continue →
                                        </button>
                                    )}
                                </div>

                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
